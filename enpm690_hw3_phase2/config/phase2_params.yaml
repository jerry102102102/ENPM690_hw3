game_manager:
  ros__parameters:
    mode: teleop_play
    cmd_input_topic: /cmd_vel_input
    cmd_output_topic: /cmd_vel
    episode_duration: 30.0
    game_dt: 0.1
    score_topic: /phase2/score
    time_topic: /phase2/time_remaining
    mode_topic: /phase2/mode
    catch_event_topic: /phase2/catch_event
    fish_state_topic: /phase2/fish_state_json
    game_state_topic: /phase2/game_state_json
    auto_reset: true
    respawn_caught_fish: true
    tuna_speed_scale: 0.8
    sardine_speed_scale: 0.4
    seaweed_speed_scale: 0.0

shark_auto_controller:
  ros__parameters:
    cmd_topic: /cmd_vel_input
    control_hz: 10.0
    k_target: 1.8
    k_wall_avoid: 1.1
    behavior_caution: 1.0
    search_forward_speed: 0.28
    search_turn_speed: 0.85
    lock_linear_speed: 0.55
    lock_min_linear_speed: 0.12
    wall_stop_distance: 0.24
    wall_slow_distance: 0.70
    lidar_target_bias: 0.9
    lidar_cluster_jump_distance: 0.22
    lidar_cluster_min_beams: 2
    lidar_cluster_max_beams: 18
    lidar_cluster_max_width: 0.55
    lidar_cluster_max_range: 3.0
    lidar_front_fov_deg: 140.0

marker_publisher:
  ros__parameters:
    marker_topic: /phase2/markers
